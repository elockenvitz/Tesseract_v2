[build.environment]
  # Vite's source-map generation balloons memory for our bundle size,
  # and Netlify's default Node heap (2GB) OOMs partway through the
  # build. 4GB is plenty of headroom — Netlify's build VMs have 8GB+
  # available so this isn't a risky bump.
  NODE_OPTIONS = "--max-old-space-size=4096"
